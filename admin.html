<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login | Royal Orchid IT Help Desk</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #9b1b30;
            --secondary: #c0395a;
            --gradient: linear-gradient(135deg, #9b1b30, #c0395a);
            --bg: #1a0a0e;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .background-blobs {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1; filter: blur(80px); opacity: 0.35;
        }
        .blob {
            position: absolute; border-radius: 50%;
            width: 450px; height: 450px;
            animation: move 20s infinite alternate;
        }
        .blob-1 { background: #9b1b30; top: -150px; right: -150px; }
        .blob-2 { background: #c0395a; bottom: -150px; left: -150px; animation-delay: -5s; }
        @keyframes move {
            from { transform: translate(0, 0); }
            to { transform: translate(150px, 80px); }
        }

        .login-card {
            background: rgba(60, 15, 25, 0.8);
            backdrop-filter: blur(24px);
            border: 1px solid rgba(255, 200, 210, 0.15);
            border-radius: 20px;
            padding: 3rem 3.5rem;
            width: 100%;
            max-width: 440px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.5);
            animation: fadeUp 0.6s ease;
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 2.5rem;
        }

        .brand img { height: 50px; }

        .brand-text h2 {
            font-size: 1.1rem;
            font-weight: 700;
            color: #f5e6e8;
            line-height: 1;
        }

        .brand-text span {
            font-size: 0.7rem;
            color: #d4a0aa;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        h1 {
            font-size: 1.8rem;
            font-weight: 800;
            color: #f5e6e8;
            margin-bottom: 0.5rem;
        }

        .subtitle {
            font-size: 0.9rem;
            color: #d4a0aa;
            margin-bottom: 2rem;
        }

        .form-group {
            margin-bottom: 1.25rem;
        }

        label {
            display: block;
            font-size: 0.8rem;
            font-weight: 600;
            color: #d4a0aa;
            margin-bottom: 0.5rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        input {
            width: 100%;
            padding: 0.85rem 1rem;
            background: #fff;
            border: 1.5px solid #c08090;
            border-radius: 10px;
            color: #1a0005;
            font-family: inherit;
            font-size: 1rem;
            font-weight: 500;
            transition: all 0.3s;
        }

        input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(155, 27, 48, 0.25);
        }

        .btn-login {
            width: 100%;
            padding: 1rem;
            background: var(--gradient);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            margin-top: 1.5rem;
            transition: all 0.3s;
            box-shadow: 0 8px 20px rgba(155, 27, 48, 0.4);
            letter-spacing: 0.5px;
        }

        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 28px rgba(155, 27, 48, 0.55);
        }

        .btn-login:disabled {
            opacity: 0.7;
            cursor: not-allowed;
            transform: none;
        }

        .error-msg {
            background: rgba(220, 38, 38, 0.2);
            border: 1px solid rgba(220, 38, 38, 0.4);
            color: #fca5a5;
            border-radius: 8px;
            padding: 0.75rem 1rem;
            font-size: 0.875rem;
            margin-top: 1rem;
            display: none;
        }

        .back-link {
            display: block;
            text-align: center;
            margin-top: 1.5rem;
            color: #d4a0aa;
            text-decoration: none;
            font-size: 0.85rem;
            transition: color 0.3s;
        }

        .back-link:hover { color: #f5e6e8; }

        .lock-icon {
            width: 52px;
            height: 52px;
            background: var(--gradient);
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            margin-bottom: 1.5rem;
            box-shadow: 0 8px 20px rgba(155,27,48,0.4);
        }
    </style>
</head>
<body>
    <div class="background-blobs">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
    </div>

    <div class="login-card">
        <div class="brand">
            <img src="logo.jpg" alt="Royal Orchid Logo">
            <div class="brand-text">
                <h2>Royal Orchid Hotels</h2>
                <span>IT Help Desk</span>
            </div>
        </div>

        <div class="lock-icon">🔐</div>
        <h1>Admin Login</h1>
        <p class="subtitle">Sign in to manage support tickets</p>

        <form id="loginForm">
            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" placeholder="admin@royalorchidhotels.com" required>
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" placeholder="Enter your password" required>
            </div>
            <button type="submit" class="btn-login" id="loginBtn">Sign In</button>
            <div class="error-msg" id="errorMsg">❌ Invalid email or password. Please try again.</div>
        </form>

        <a href="index.html" class="back-link">← Back to Help Desk Portal</a>
    </div>

    <script>
        // Check if already logged in
        if (sessionStorage.getItem('admin_logged_in') === 'true') {
            window.location.href = 'dashboard.html';
        }

        document.getElementById('loginForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value.trim().toLowerCase();
            const password = document.getElementById('password').value;
            const btn = document.getElementById('loginBtn');
            const errorMsg = document.getElementById('errorMsg');

            btn.disabled = true;
            btn.textContent = 'Signing in...';
            errorMsg.style.display = 'none';

            // Simulate network delay for realism
            setTimeout(() => {
                if (email === 'it@royalorchidhotels.com' && password === 'Creater@2026') {
                    sessionStorage.setItem('admin_logged_in', 'true');
                    sessionStorage.setItem('admin_email', email);
                    window.location.href = 'dashboard.html';
                } else {
                    errorMsg.style.display = 'block';
                    btn.disabled = false;
                    btn.textContent = 'Sign In';
                }
            }, 800);
        });
    </script>
</body>
</html>
