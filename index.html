<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Royal Orchid | IT Help Desk Portal</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="background-blobs">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
    </div>

    <header class="navbar">
        <div class="container">
            <div class="logo" style="display: flex; align-items: center; gap: 10px;">
                <img src="logo.jpg" alt="Royal Orchid Logo" style="height: 48px;">
                <div>
                    <div>Royal Orchid Hotels</div>
                    <span class="logo-subtitle">IT Help Desk</span>
                </div>
            </div>
            <nav>
                <a href="#" class="nav-link active">Open Ticket</a>
                <a href="#" class="nav-link">Check Status</a>
            </nav>
        </div>
    </header>

    <main class="hero">
        <div class="container">
            <div class="hero-content">
                <h1>Submit an <span class="text-gradient">IT Support Ticket</span></h1>
                <p>We're here to help you stay productive. Fill out the form below and our team will get back to you promptly.</p>
            </div>

            <div class="card glass">
                <form id="ticketForm">
                    <div class="form-grid">
                        <div class="form-group">
                            <label for="hotelName">Hotel Name</label>
                            <select id="hotelName" required>
                                <option value="" disabled selected>Select Hotel...</option>
                                <option value="Hotel Royal Orchid Corporate Office">Hotel Royal Orchid Corporate Office</option>
                                <option value="Hotel Royal Orchid Bangalore">Hotel Royal Orchid Bangalore</option>
                                <option value="Royal Orchid Central - Bangalore">Royal Orchid Central - Bangalore</option>
                                <option value="Regenta Place - Bangalore">Regenta Place - Bangalore</option>
                                <option value="Royal Orchid Central, Pune">Royal Orchid Central, Pune</option>
                                <option value="Royal Orchid Metropole, Mysore">Royal Orchid Metropole, Mysore</option>
                                <option value="Royal Orchid Brindavan, Mysore">Royal Orchid Brindavan, Mysore</option>
                                <option value="Royal Orchid Beach Resort &amp; Spa - Goa">Royal Orchid Beach Resort &amp; Spa - Goa</option>
                                <option value="Royal Orchid Central - Hospet">Royal Orchid Central - Hospet</option>
                                <option value="Hotel Royal Orchid Jaipur">Hotel Royal Orchid Jaipur</option>
                                <option value="Royal Orchid Resorts &amp; Convention Centre">Royal Orchid Resorts &amp; Convention Centre</option>
                                <option value="Regenta Central Hotel &amp; Convention Centre">Regenta Central Hotel &amp; Convention Centre</option>
                                <option value="Regenta Central Imperial Goa">Regenta Central Imperial Goa</option>
                                <option value="Regenta Central Grand Exotica, Pune">Regenta Central Grand Exotica, Pune</option>
                                <option value="Regebta Suits Gurugram">Regebta Suits Gurugram</option>
                                <option value="Regenta Resort - Sakleshpur">Regenta Resort - Sakleshpur</option>
                                <option value="Iconica - Mumbai">Iconica - Mumbai</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label for="fullName">Full Name</label>
                            <input type="text" id="fullName" placeholder="Your Name" required>
                        </div>
                        <div class="form-group">
                            <label for="workEmail">Work Email</label>
                            <input type="email" id="workEmail" placeholder="yourname@royalorchidhotels.com" required>
                        </div>
                        <div class="form-group">
                            <label for="department">Department</label>
                            <input type="text" id="department" placeholder="IT, Accounts, Front Office..." required>
                        </div>
                        <div class="form-group">
                            <label for="category">Support Category</label>
                            <select id="category" required>
                                <option value="" disabled selected>Select Category...</option>
                                <option value="Software">Software Issues</option>
                                <option value="Hardware">Hardware / Desktop Support</option>
                                <option value="Network">Network / Wi-Fi</option>
                                <option value="Zoho">Zoho Applications</option>
                                <option value="Email">Email / Outlook</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label for="priority">Priority level</label>
                            <select id="priority" required>
                                <option value="Low">Low (General Query)</option>
                                <option value="Medium" selected>Medium (Action needed)</option>
                                <option value="High">High (Immediate Action)</option>
                                <option value="Critical">Critical (System Down)</option>
                            </select>
                        </div>
                    </div>

                    <div class="form-group mt-large">
                        <label for="subject">Issue Subject</label>
                        <input type="text" id="subject" placeholder="Summarize your issue..." required>
                    </div>

                    <div class="form-group mt-large">
                        <label for="description">Detailed Description</label>
                        <textarea id="description" rows="5" placeholder="Please provide details to help us diagnose the issue faster..." required></textarea>
                    </div>

                    <div class="form-footer mt-xlarge">
                        <button type="submit" class="btn btn-primary" id="submitBtn">
                            Submit Support Ticket
                            <div class="btn-loader hidden"></div>
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </main>

    <div id="toast" class="toast hidden">
        <div class="toast-icon">✓</div>
        <div class="toast-content">
            <div class="toast-title">Ticket Submitted!</div>
            <div class="toast-msg">Our IT team has been notified.</div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
